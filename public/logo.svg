<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="outerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
      <feFlood flood-color="#3b82f6" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer circuit ring -->
  <circle cx="200" cy="200" r="160" stroke="url(#glow)" stroke-width="1.5" opacity="0.4" filter="url(#neon)"/>
  <circle cx="200" cy="200" r="140" stroke="url(#glow)" stroke-width="1" opacity="0.25"/>

  <!-- Circuit lines radiating outward -->
  <!-- Top -->
  <line x1="200" y1="60" x2="200" y2="40" stroke="#3b82f6" stroke-width="1.5" opacity="0.6"/>
  <circle cx="200" cy="38" r="3" fill="#3b82f6" opacity="0.8"/>
  <!-- Top-right -->
  <line x1="310" y1="100" x2="325" y2="85" stroke="#3b82f6" stroke-width="1.5" opacity="0.6"/>
  <circle cx="327" cy="83" r="3" fill="#f59e0b" opacity="0.9"/>
  <!-- Right -->
  <line x1="340" y1="200" x2="360" y2="200" stroke="#3b82f6" stroke-width="1.5" opacity="0.6"/>
  <circle cx="362" cy="200" r="3" fill="#3b82f6" opacity="0.8"/>
  <!-- Bottom-right -->
  <line x1="310" y1="300" x2="325" y2="315" stroke="#3b82f6" stroke-width="1.5" opacity="0.6"/>
  <circle cx="327" cy="317" r="3" fill="#f59e0b" opacity="0.9"/>
  <!-- Bottom -->
  <line x1="200" y1="340" x2="200" y2="360" stroke="#3b82f6" stroke-width="1.5" opacity="0.6"/>
  <circle cx="200" cy="362" r="3" fill="#3b82f6" opacity="0.8"/>
  <!-- Bottom-left -->
  <line x1="90" y1="300" x2="75" y2="315" stroke="#3b82f6" stroke-width="1.5" opacity="0.6"/>
  <circle cx="73" cy="317" r="3" fill="#f59e0b" opacity="0.9"/>
  <!-- Left -->
  <line x1="60" y1="200" x2="40" y2="200" stroke="#3b82f6" stroke-width="1.5" opacity="0.6"/>
  <circle cx="38" cy="200" r="3" fill="#3b82f6" opacity="0.8"/>
  <!-- Top-left -->
  <line x1="90" y1="100" x2="75" y2="85" stroke="#3b82f6" stroke-width="1.5" opacity="0.6"/>
  <circle cx="73" cy="83" r="3" fill="#f59e0b" opacity="0.9"/>

  <!-- Inner circuit pattern -->
  <circle cx="200" cy="200" r="110" stroke="#3b82f6" stroke-width="0.8" opacity="0.15" stroke-dasharray="8 6"/>

  <!-- Tech icons around the circle -->
  <!-- Monitor (top-left) -->
  <g transform="translate(95, 85)" filter="url(#neon)" opacity="0.85">
    <rect x="0" y="0" width="24" height="16" rx="2" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
    <line x1="8" y1="18" x2="16" y2="18" stroke="#60a5fa" stroke-width="1.5"/>
    <line x1="12" y1="16" x2="12" y2="18" stroke="#60a5fa" stroke-width="1.5"/>
    <line x1="3" y1="5" x2="14" y2="5" stroke="#60a5fa" stroke-width="1" opacity="0.6"/>
    <line x1="3" y1="8" x2="10" y2="8" stroke="#60a5fa" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- WiFi (top) -->
  <g transform="translate(188, 68)" filter="url(#neon)" opacity="0.85">
    <path d="M12 20 L12 20" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M6 16 Q12 10 18 16" stroke="#60a5fa" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M2 12 Q12 4 22 12" stroke="#60a5fa" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Globe (top-right) -->
  <g transform="translate(275, 85)" filter="url(#neon)" opacity="0.85">
    <circle cx="12" cy="12" r="10" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
    <ellipse cx="12" cy="12" rx="5" ry="10" stroke="#60a5fa" stroke-width="1" fill="none"/>
    <line x1="2" y1="12" x2="22" y2="12" stroke="#60a5fa" stroke-width="1"/>
  </g>

  <!-- Phone (bottom) -->
  <g transform="translate(188, 305)" filter="url(#neon)" opacity="0.85">
    <rect x="4" y="0" width="16" height="26" rx="3" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
    <line x1="10" y1="22" x2="14" y2="22" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Cloud (bottom-left) -->
  <g transform="translate(80, 285)" filter="url(#neon)" opacity="0.85">
    <path d="M8 20 Q2 20 2 15 Q2 10 7 10 Q8 5 14 6 Q18 3 22 7 Q26 7 26 12 Q26 16 22 16 Q22 20 17 20 Z" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
  </g>

  <!-- Gear (bottom-right) -->
  <g transform="translate(290, 285)" filter="url(#neon)" opacity="0.85">
    <circle cx="12" cy="12" r="5" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
    <path d="M12 2 L12 5 M12 19 L12 22 M2 12 L5 12 M19 12 L22 12 M5 5 L7.5 7.5 M16.5 16.5 L19 19 M19 5 L16.5 7.5 M7.5 16.5 L5 19" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Main text: RC TECH -->
  <text x="200" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="900" font-size="56" fill="url(#textGrad)" filter="url(#outerGlow)" letter-spacing="6">
    RC TECH
  </text>

  <!-- Binary code subtitle -->
  <text x="200" y="225" text-anchor="middle" font-family="monospace" font-size="14" fill="#60a5fa" opacity="0.5" letter-spacing="4">
    0100101
  </text>

  <!-- Junction dots on circuit ring -->
  <circle cx="200" cy="60" r="2.5" fill="#60a5fa" opacity="0.7"/>
  <circle cx="340" cy="200" r="2.5" fill="#60a5fa" opacity="0.7"/>
  <circle cx="200" cy="340" r="2.5" fill="#60a5fa" opacity="0.7"/>
  <circle cx="60" cy="200" r="2.5" fill="#60a5fa" opacity="0.7"/>
  <circle cx="312" cy="100" r="2.5" fill="#60a5fa" opacity="0.5"/>
  <circle cx="312" cy="300" r="2.5" fill="#60a5fa" opacity="0.5"/>
  <circle cx="88" cy="100" r="2.5" fill="#60a5fa" opacity="0.5"/>
  <circle cx="88" cy="300" r="2.5" fill="#60a5fa" opacity="0.5"/>
</svg>